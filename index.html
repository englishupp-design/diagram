<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindLander — Emotional Intelligence</title>
  <meta name="description" content="MindLander is an Emotional Intelligence school for leaders, educators, and businesses." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F5F0E8;
      --dark: #1A1A1A;
      --accent: #C8956A;
      --accent-light: #E8D5C0;
      --muted: #6B6560;
      --white: #FFFFFF;
      --card-bg: #FDFAF6;
      --border: #E2D9CC;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); line-height: 1.6; font-size: 16px; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(245,240,232,0.93); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 64px;
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; color: var(--dark); }
    .nav-logo svg { display: block; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--muted); font-size: 0.875rem; font-weight: 500; letter-spacing: 0.02em; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 16px; }

    /* ── LANGUAGE SWITCHER ── */
    .lang-switcher { display: flex; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
    .lang-btn {
      background: none; border: none; cursor: pointer;
      padding: 6px 14px; font-size: 0.8rem; font-weight: 600;
      font-family: 'DM Sans', sans-serif; letter-spacing: 0.05em;
      color: var(--muted); transition: all 0.2s;
    }
    .lang-btn.active { background: var(--dark); color: var(--white); }
    .lang-btn:not(.active):hover { background: var(--accent-light); }

    .nav-cta {
      background: var(--dark); color: var(--white);
      padding: 10px 24px; border-radius: 100px;
      text-decoration: none; font-size: 0.875rem; font-weight: 500;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: var(--accent); }

    /* ── SECTIONS ── */
    section { padding: 100px 40px; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 16px; }
    h2 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 600; line-height: 1.2; margin-bottom: 48px; }
    h2 em { font-style: italic; color: var(--accent); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 120px 40px 80px; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(200,149,106,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 24px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 7vw, 6rem); font-weight: 700; line-height: 1.1; max-width: 800px; margin-bottom: 32px; }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero-sub { font-size: 1.125rem; color: var(--muted); max-width: 540px; margin-bottom: 48px; line-height: 1.7; }
    .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .btn-primary { background: var(--dark); color: var(--white); padding: 14px 36px; border-radius: 100px; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: background 0.2s, transform 0.2s; display: inline-block; }
    .btn-primary:hover { background: var(--accent); transform: translateY(-2px); }
    .btn-secondary { border: 1.5px solid var(--border); color: var(--dark); padding: 14px 36px; border-radius: 100px; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: border-color 0.2s, transform 0.2s; display: inline-block; }
    .btn-secondary:hover { border-color: var(--accent); transform: translateY(-2px); }

    /* ── WHO WE ARE ── */
    .who-we-are { background: var(--white); }
    .who-cards {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px;
    }
    .who-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 24px; overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
      display: flex; flex-direction: column;
    }
    .who-card:hover { transform: translateY(-6px); box-shadow: 0 20px 48px rgba(0,0,0,0.09); }
    .who-card-photo {
      width: 100%; aspect-ratio: 1/1; object-fit: cover;
      object-position: top center; display: block;
    }
    .who-card-photo-placeholder {
      width: 100%; aspect-ratio: 1/1;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 5rem; color: var(--accent); font-weight: 700;
    }
    .who-card-body {
      padding: 28px 28px 32px; display: flex; flex-direction: column; gap: 10px; flex: 1;
    }
    .who-card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; font-weight: 700; color: var(--dark);
    }
    .who-card-title {
      font-size: 0.8rem; color: var(--accent); font-weight: 600;
      letter-spacing: 0.04em; line-height: 1.5;
    }
    .who-card-divider {
      width: 40px; height: 2px; background: var(--accent-light); border-radius: 2px; margin: 4px 0;
    }
    .who-card-bio {
      color: var(--muted); line-height: 1.75; font-size: 0.9rem; flex: 1;
    }
    .who-card-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .who-card-tag {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 100px; padding: 4px 12px;
      font-size: 0.75rem; color: var(--muted); font-weight: 500;
    }
    .who-card-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--accent); text-decoration: none; font-weight: 600;
      font-size: 0.85rem; margin-top: 12px; transition: gap 0.2s;
    }
    .who-card-link:hover { gap: 10px; }
    .who-card-link::after { content: '→'; }
    @media (max-width: 900px) { .who-cards { grid-template-columns: 1fr; } }

    /* ── FOR WHOM ── */
    .for-whom { background: var(--white); }
    .for-whom .intro { font-size: 1.125rem; color: var(--muted); margin-bottom: 56px; max-width: 600px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 36px 32px; transition: transform 0.2s, box-shadow 0.2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.07); }
    .card-num { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; color: var(--accent-light); line-height: 1; margin-bottom: 16px; }
    .card p { color: var(--muted); line-height: 1.7; }
    .card p strong { color: var(--dark); }

    /* ── WHY NOW ── */
    .why-now { background: var(--dark); color: var(--white); }
    .why-now h2 { color: var(--white); }
    .why-now .lead { font-size: 1.2rem; line-height: 1.8; max-width: 680px; color: rgba(255,255,255,0.75); margin-bottom: 48px; }
    .tags { display: flex; flex-wrap: wrap; gap: 12px; }
    .tag { border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); padding: 8px 18px; border-radius: 100px; font-size: 0.8rem; letter-spacing: 0.05em; transition: border-color 0.2s, color 0.2s; }
    .tag:hover { border-color: var(--accent); color: var(--accent); }
    .tag.highlight { border-color: var(--accent); color: var(--accent); }

    /* ── WHAT IS EQ ── */
    .what-eq { background: var(--cream); }
    .eq-list { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .eq-list li { display: flex; align-items: flex-start; gap: 24px; padding: 28px 0; border-bottom: 1px solid var(--border); font-size: 1.125rem; line-height: 1.6; }
    .eq-list li:last-child { border-bottom: none; }
    .eq-num { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--accent); font-weight: 600; min-width: 36px; padding-top: 2px; }
    .eq-list em { font-style: italic; color: var(--accent); }
    .eq-question { margin-top: 40px; font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; color: var(--muted); }

    /* ── APPROACH ── */
    .approach { background: var(--white); }
    .approach-model { display: flex; align-items: center; justify-content: center; gap: 24px; flex-wrap: wrap; margin-top: 8px; }
    .model-box { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 16px; padding: 32px 48px; text-align: center; font-size: 1.25rem; font-weight: 600; }
    .model-arrow { font-size: 2rem; color: var(--accent); font-weight: 300; }
    .model-eq { font-size: 1rem; color: var(--muted); font-weight: 400; margin-top: 8px; font-style: italic; }

    /* ── TESTIMONIALS ── */
    .testimonials { background: var(--cream); }
    .testi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
    .testi-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 32px; transition: transform 0.2s; }
    .testi-card:hover { transform: translateY(-3px); }
    .stars { color: var(--accent); font-size: 0.9rem; margin-bottom: 16px; letter-spacing: 2px; }
    .testi-text { color: var(--muted); line-height: 1.75; margin-bottom: 20px; font-size: 0.95rem; }
    .testi-author { font-weight: 600; color: var(--dark); font-size: 0.9rem; }
    .testi-role { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }

    /* ── FORMATS ── */
    .formats { background: var(--dark); color: var(--white); }
    .formats h2 { color: var(--white); }
    .tabs { display: flex; gap: 4px; margin-bottom: 48px; }
    .tab-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); padding: 10px 28px; border-radius: 100px; cursor: pointer; font-size: 0.875rem; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: var(--white); }
    .tab-content { display: none; }
    .tab-content.active { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
    .format-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 36px 32px; transition: background 0.2s; }
    .format-card:hover { background: rgba(255,255,255,0.08); }
    .format-label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; font-weight: 600; }
    .format-card h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--white); margin-bottom: 16px; }
    .format-card p { color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 24px; }
    .format-link { color: var(--accent); text-decoration: none; font-size: 0.875rem; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
    .format-link::after { content: '→'; }
    .biz-options { display: flex; flex-direction: column; gap: 16px; }
    .biz-option { display: flex; gap: 16px; align-items: flex-start; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 24px; }
    .biz-icon { font-size: 1.5rem; }
    .biz-option h4 { color: var(--white); font-size: 1rem; margin-bottom: 6px; }
    .biz-option p { color: rgba(255,255,255,0.6); font-size: 0.875rem; line-height: 1.6; }

    /* ── CURRICULUM ── */
    .curriculum { background: var(--cream); }
    .modules { display: flex; flex-direction: column; gap: 2px; }
    .module { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--white); }
    .module-header { display: flex; align-items: center; gap: 20px; padding: 24px 28px; cursor: pointer; transition: background 0.2s; }
    .module-header:hover { background: var(--card-bg); }
    .module-num { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--accent); min-width: 28px; }
    .module-title { font-weight: 600; font-size: 1rem; flex: 1; }
    .module-toggle { color: var(--muted); font-size: 1.2rem; transition: transform 0.3s; }
    .module.open .module-toggle { transform: rotate(45deg); }
    .module-body { display: none; padding: 0 28px 24px 68px; color: var(--muted); line-height: 1.75; font-size: 0.95rem; }
    .module.open .module-body { display: block; }
    .module-bonus { background: linear-gradient(135deg, rgba(200,149,106,0.08), transparent); }
    .module-includes { margin-top: 32px; padding: 20px 24px; border: 1px dashed var(--accent); border-radius: 12px; text-align: center; color: var(--muted); font-size: 0.95rem; }
    .module-includes strong { color: var(--dark); }

    /* ── CTA BANNER ── */
    .cta-banner { background: var(--accent); padding: 80px 40px; text-align: center; }
    .cta-banner h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 4vw, 3rem); color: var(--white); margin-bottom: 32px; }
    .btn-white { background: var(--white); color: var(--accent); padding: 16px 48px; border-radius: 100px; text-decoration: none; font-weight: 600; font-size: 1rem; display: inline-block; transition: transform 0.2s; }
    .btn-white:hover { transform: translateY(-3px); }

    /* ── FOOTER ── */
    footer { background: var(--dark); color: rgba(255,255,255,0.6); padding: 60px 40px 40px; }
    .footer-inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 48px; margin-bottom: 48px; }
    .footer-brand { display: flex; flex-direction: column; gap: 12px; }
    .footer-brand img { height: 32px; }
    .footer-brand p { font-size: 0.875rem; line-height: 1.6; }
    footer h4 { color: var(--white); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
    footer ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    footer ul a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.875rem; transition: color 0.2s; }
    footer ul a:hover { color: var(--accent); }
    .footer-bottom { max-width: 1100px; margin: 0 auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 32px; font-size: 0.8rem; color: rgba(255,255,255,0.4); }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 20px; padding: 48px; max-width: 560px; width: 100%; position: relative; max-height: 80vh; overflow-y: auto; }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--muted); line-height: 1; }
    .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 24px; }
    .modal h4 { font-size: 1rem; font-weight: 600; margin: 20px 0 8px; }
    .modal p { color: var(--muted); line-height: 1.7; font-size: 0.95rem; }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .nav-links { display: none; }
      section { padding: 70px 20px; }
      .hero { padding: 100px 20px 60px; }
      .footer-inner { grid-template-columns: 1fr; gap: 32px; }
      .approach-model { flex-direction: column; }
    }
  </style>
</head>

<section class="why-now">
  <div class="section-inner">

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;

  // Update button states
  document.querySelectorAll('.lang-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && lang === 'en') || (i === 1 && lang === 'uk'));
  });

  // Update all translatable elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key] !== undefined) {
      el.innerHTML = i18n[lang][key];
    }
  });

  // Update page title
  document.title = lang === 'uk' ? 'MindLander — Емоційний Інтелект' : 'MindLander — Emotional Intelligence';

  // Re-sync tab buttons text (they get overwritten by data-i18n but need active class preserved)
  const activeTab = document.querySelector('.tab-btn.active');
  if (activeTab) activeTab.classList.add('active');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function toggleModule(header) {
  header.parentElement.classList.toggle('open');
}

// Init English on load
setLang('en');
